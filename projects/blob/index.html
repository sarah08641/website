<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blob Blind Box</title>
    <style>
        * { font-family: 'Andale Mono', monospace; }
        * {color: #000000}
        * {text-align: center;}
        
        body {
            background-color: rgb(255, 242, 225);
        }
        img {
            position: absolute;
            width: 50%; 
            height: auto;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            object-fit: contain;
        }
        .rarity {
            position: absolute;
            right: 40px;          
            top: 50%;   
            transform: translateY(-50%);
            
            display: flex;
            flex-direction: column;
            gap: 10px;            
            width: 200px;
            background-color: rgba(255, 255, 255, 0.5); 
            padding: 20px;
            border-radius: 15px;
            text-align: right;    
        }
        button-hidden {
            color: rgb(255, 242, 225);
            border-radius: 30px;
            position: absolute;
            left: 20px; 
            bottom: 20px;
            transform: translateY(-50%);
            cursor: pointer;

        }
        button {
            position: relative;
            padding: 15px 30px;
            font-size: 18px;
            background-color: rgba(255, 255, 255, 0.371);
            color: rgb(0, 0, 0);
            border-radius: 30px;
            cursor: pointer;
            display: block;
            margin: auto; 
        }
        button:hover {
            transform: scale(1.05)
        }
    </style>

</head>

<body>

    <img id="blob-img" src="images/box.png"/>
    <button id="open-box">Open Blind Box</button>
    <div class="rarity">
        <h3>Rarity</h3>
        <p>Water Blob: 28%</p>
        <p>Forest Blob: 25%</p>
        <p>Bubblegum Blob: 20%</p>
        <p>Butter Blob: 15%</p>
        <p>Lavender Blob: 5%</p>
        <p>Midnight Blob: 5%</p>
        <p>Shy Blob: 2%</p>
    </div>
    <button-hidden id="shy-button">I'm hiding...</button-hidden>

</body>

<script>
    const btn = document.getElementById('open-box');
    const hiddenBtn = document.getElementById('shy-button');
    const blobImg = document.getElementById('blob-img');
    let blobSettings;

    const blobs = [
        'images/bubblegum_blob.gif',
        'images/water_blob.gif',
        'images/forest_blob.gif',
        'images/butter_blob.gif',
        'images/lavender_blob.gif',
        'images/shy_blob.gif'
    ];

    const currentHour = new Date().getHours();

    if(currentHour > 6 && currentHour < 19) {
        blobSettings = [
            {path: 'images/bubblegum_blob.gif', weight: 20},
            {path: 'images/water_blob.gif', weight: 25},
            {path: 'images/forest_blob.gif', weight: 28},
            {path: 'images/lavender_blob.gif', weight: 9},
            {path: 'images/butter_blob.gif', weight: 15},
            {path: 'images/shy_blob.gif', weight: 2},
            {path: 'images/midnight_blob.gif', weight: 1}
            ]
    } else {
        blobSettings = [
            {path: 'images/bubblegum_blob.gif', weight: 15},
            {path: 'images/water_blob.gif', weight: 20},
            {path: 'images/forest_blob.gif', weight: 23},
            {path: 'images/lavender_blob.gif', weight: 5},
            {path: 'images/butter_blob.gif', weight: 5},
            {path: 'images/shy_blob.gif', weight: 2},
            {path: 'images/midnight_blob.gif', weight: 30}
        ]
    }

    hiddenBtn.addEventListener('click', () => {
        oldImage = blobImg.src;
        blobImg.src = 'images/shy_blob.gif';
        alert("You found shy blob!");
        setTimeout(() => {
            blobImg.src = oldImage;
        }, 2000);


    });
    btn.addEventListener('click', () => {
        let pool = [];
        blobSettings.forEach(blob => {
            for (let i = 0; i < blob.weight; i++) {
                pool.push(blob.path);
            }
        });

        const randomIndex = Math.floor(Math.random() * pool.length);
        const selectedBlob = pool[randomIndex];
        blobImg.src = selectedBlob;
        btn.textContent = "You got " + selectedBlob.replace(/images\/|\.gif/g, "").replace("_", " ") + "!";
        btn.disabled = true;
    }, {once: true});
</script>

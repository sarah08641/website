<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Outfit Maker</title>
    <style>
        * { font-family: 'Georgia', serif; }
        * {color: #636363}
        body {
            background-color: pink;
        }
        /* CSS: The Layering Logic */
        .wardrobe-app {
            display: flex;
            gap: 50px;
            font-family: sans-serif;
            padding: 20px;
        }

        .preview-window {
            position: relative; 
            width: 500px;   /* Set your desired width here */
            height: 700px;  /* Set your desired height here */
            border: 2px solid #333;
            background-color: #ffffff;
            overflow: hidden; /* Keeps images from "spilling out" */
            margin: 0 auto;   /* Centers the box on the page */
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            object-fit: contain;
            display: block;
        }
        
        .layer[src=""], .layer:not([src]) {
            visibility: hidden;
        }

        /* Order matters: Higher z-index is on top */
        #layer-body   { z-index: 1; }
        #layer-shoes { z-index: 2; }
        #layer-bottoms  { z-index: 3; }
        #layer-shirt  { z-index: 4; }
        #layer-jacket { z-index: 5; }
        #layer-hair { z-index: 6; }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 250px;
                }


        select {
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #aaa;
            background-color: white;
            cursor: pointer;
        }

        label {
            font-weight: bold;
            margin-bottom: -15px; /* Pulls the label closer to its box */
        }

        button {
            padding: 10px;
            cursor: pointer;
            background: rgb(255, 233, 237);
            border: 1px solid #999;
            border-radius: 5px;
            font-weight: bold;
        } 

        button:hover { background: #e0e0e0; }
    </style>
</head>
<body>

    <div class="wardrobe-app">
        <div class="preview-window">
            <img id="layer-body"   class="layer" src="images/body.png">
            <img id="layer-bottoms"  class="layer" src="">
            <img id="layer-shirt"  class="layer" src="">
            <img id="layer-jacket" class="layer" src="">
            <img id="layer-shoes"  class="layer" src="">
            <img id="layer-hair" class="layer" src="images/hair.png">
        </div>

        <div class="menu">
            <h2>Wardrobe</h2>
            
            <label for="shirt-select">Choose a Shirt:</label>
            <select id="shirt-select" onchange="change('shirt', this.value)">
                <option value="">-- None --</option>
                <option value="images/tops/shirt_long_red.png">Red Long Sleeve</option>
                <option value="images/tops/shirt_long_brown.png">Brown Long Sleeve</option>
                <option value="images/tops/shirt_long_white.png">White Long Sleeve</option>
                <option value="images/tops/shirt_long_black.png">Black Long Sleeve</option>
                <option value="images/tops/shirt_long_green.png"> Green Long Sleeve</option>
                <option value="images/tops/tank_black.png">Black Tank</option>
                <option value="images/tops/tank_gray.png">Gray Tank</option>
                <option value="images/tops/tank_periwinkle.png">Periwinkle Tank</option>
                <option value="images/tops/tank_red.png">Red Tank</option>
                <option value="images/tops/tank_brown.png">Brown Tank</option>
                <option value="images/tops/henley_red.png">Red Henley</option>
                <option value="images/tops/henley_white.png">White Henley</option>
                <option value="images/tops/henley_gray.png">Gray Henley</option>
                <option value="images/tops/babydoll_pink.png">Pink Babydoll</option>
                <option value="images/tops/babydoll_red.png">Red Babydoll</option>
                <option value="images/tops/babydoll_white.png">White Babydoll</option>
                <option value="images/tops/offshoulder_green.png">Green Off-the-shoulder</option>
                <option value="images/tops/offshoulder_short_black.png">Black Off-the-shoulder Tee</option>
                <option value="images/tops/offshoulder_long_black.png">Black Off-the-shoulder Long Sleeve</option>
                <option value="images/tops/offshoulder_white.png">White Off-the-shoulder Blouse</option>
                <option value="images/tops/blouse_green.png">Green Blouse</option>
                <option value="images/tops/blouse_white.png">White Blouse</option>
            </select>

            <label for="jacket-select">Choose a Jacket:</label>
            <select id="jacket-select" onchange="change('jacket', this.value)">
                <option value="">-- None --</option>
                <option value="images/jackets/short_brown.png">Short Brown Jacket </option>
                <option value="images/jackets/long_brown.png">Long Brown Jacket </option>
                <option value="images/jackets/cardigan_white.png">White Cardigan </option>
            </select>

            <label for="bottoms-select">Choose Bottoms:</label>
            <select id="bottoms-select" onchange="change('bottoms', this.value)">
                <option value="">-- None --</option>
                <option value="images/bottoms/bootcut_blue.png">Blue Bootcut</option>
                <option value="images/bottoms/bootcut_light.png">Light Bootcut</option>
                <option value="images/bottoms/flare_brown.png">Brown Flare</option>
                <option value="images/bottoms/wideleg_brown.png">Brown Wideleg</option>
                <option value="images/bottoms/baggy_blue.png">Blue Baggy</option>
                <option value="images/bottoms/skirt_brown.png">Brown Skirt</option>
                <option value="images/bottoms/skirt_black.png">Black Skirt</option>
                <option value="images/bottoms/shorts_brown.png">Brown Shorts</option>
            </select>

            <label for="shoes-select">Choose Shoes:</label>
            <select id="shoes-select" onchange="change('shoes', this.value)">
                <option value="">-- None --</option>
                <option value="images/shoes/maryjanes_black.png">Black Maryjanes</option>
                <option value="images/shoes/maryjanes_red.png">Red Maryjanes</option>
                <option value="images/shoes/maryjanes_brown.png">Brown Maryjanes</option>
                <option value="images/shoes/sneakers_white.png">White Sneakers</option>
                <option value="images/shoes/wedges_tan.png">Tan Wedges</option>
   
            </select>

            <button class="nav-button" onclick="randomize()">Randomize Outfit</button>
        </div>
    </div>

    <script>


        function change(slot, filePath) {
            // Find the image tag by its ID
            const layer = document.getElementById('layer-' + slot);
            // Change the image source to your file
            layer.src = filePath;
        }

        function clearLayer(slot) {
            document.getElementById('layer-' + slot).src = "";
        }

        function randomize() {
            const categories = ['shirt-select', 'jacket-select', 'bottoms-select', 'shoes-select'];

            categories.forEach(id => {
                const select = document.getElementById(id);
                
                // Get all options in this dropdown
                const options = select.options;
                
                let randomIndex;
        
                // Makes sure "None" is not an option for shirt and bottom
                if (id === 'shirt-select' || id === 'bottoms-select') {
                    // Pick a number between 1 and the last index
                    randomIndex = Math.floor(Math.random() * (options.length - 1)) + 1;
                } else {
                    // Jackets and shoes can still be "None" (index 0)
                    randomIndex = Math.floor(Math.random() * options.length);
                }
                
                // Set the dropdown to that random choice
                select.selectedIndex = randomIndex;

                // Trigger the change function to update the image on the character
                // We split the ID (e.g., 'shirt-select') to get just 'shirt'
                const slot = id.split('-')[0]; 
                change(slot, select.value);
            });
}
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blob Blind Box</title>
    <style>
        * { font-family: 'Andale Mono', monospace; }
        * {color: #000000}
        * {text-align: center;}
        
        body {
            background-color: rgb(255, 242, 225);
        }
        img {
            position: absolute;
            width: 50%;         /* Allows it to shrink on small screens (phones) */
            height: auto;        /* Maintains the natural aspect ratio so it's not squished */
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            object-fit: contain;
        }
        .rarity {
            position: absolute;
            right: 40px;          /* Distance from the right edge */
            top: 50%;             /* Start at the middle vertically */
            transform: translateY(-50%); /* Perfectly center it vertically */
            
            display: flex;
            flex-direction: column;
            gap: 10px;            /* Spacing between items */
            width: 200px;
            background-color: rgba(255, 255, 255, 0.5); /* Optional: semi-transparent bg */
            padding: 20px;
            border-radius: 15px;
            text-align: right;    /* Aligns text to the right for a clean look */
        }
        button {
            position: relative;
            padding: 15px 30px;
            font-size: 18px;
            background-color: rgba(255, 255, 255, 0.371);
            color: rgb(0, 0, 0);
            border-radius: 30px;
            cursor: pointer;
            display: block;
            margin: auto; 
        }
        button:hover {
            transform: scale(1.05)
        }
    </style>

</head>

<body>

    <img id="blob-img" src="images/box.png"/>
    <button id="open-box">Open Blind Box</button>
    <div class="rarity">
        <h3>Rarity</h3>
        <p>Water Blob: 30%</p>
        <p>Forest Blob: 28%</p>
        <p>Water Blob: 25%</p>
        <p>Bubblegum Blob: 20%</p>
        <p>Butter Blob: 15%</p>
        <p>Lavender Blob: 5%</p>
        <p>Midnight Blob: 5%</p>
        <p>Shy Blob: 2%</p>

    </div>

</body>

<script>
    const btn = document.getElementById('open-box');
    const blobImg = document.getElementById('blob-img');
    const blobs = [
        'images/bubblegum_blob.gif',
        'images/water_blob.gif',
        'images/forest_blob.gif',
        'images/butter_blob.gif',
        'images/lavender_blob.gif',
        'images/shy_blob.gif'
    ];

    const blobSettings = [
        {path: 'images/bubblegum_blob.gif', weight: 20},
        {path: 'images/water_blob.gif', weight: 25},
        {path: 'images/forest_blob.gif', weight: 28},
        {path: 'images/lavender_blob.gif', weight: 5},
        {path: 'images/butter_blob.gif', weight: 15},
        {path: 'images/shy_blob.gif', weight: 2},
        {path: 'images/midnight_blob.gif', weight: 5}
    ];
    btn.addEventListener('click', () => {
        let pool = [];
        blobSettings.forEach(blob => {
            for (let i = 0; i < blob.weight; i++) {
                pool.push(blob.path);
            }
        });

        // 3. Pick from the pool (which now has 100 items)
        const randomIndex = Math.floor(Math.random() * pool.length);
        const selectedBlob = pool[randomIndex];
        blobImg.src = selectedBlob;
        // alert('You opened a new Blob!');
        // Here you could change the img src to a different blob
        btn.textContent = "You got " + selectedBlob.replace(/images\/|\.gif/g, "").replace("_", " ") + "!";
        btn.disabled = true;
    }, {once: true});

    // Function to set a cookie
    function setCookie(name, value, minutes) {
        const date = new Date();
        date.setTime(date.getTime() + (minutes * 60 * 1000));
        const expires = "expires=" + date.toUTCString();
        document.cookie = name + "=" + value + ";" + expires + ";path=/";
    }

    // Function to get a cookie
    function getCookie(name) {
        const nameEQ = name + "=";
        const ca = document.cookie.split(';');
        for(let i = 0; i < ca.length; i++) {
            let c = ca[i].trim();
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
        }
        return null;
    }

</script>

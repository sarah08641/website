<!DOCTYPE html>
<head>

    <title>Test</title>

<style>


    dialog::backdrop {
        background-color: rgb(255, 255, 255);
    }

    dialog {
        border: 0px;
        padding: 20px;
    }


    .modal-inner {
        background-color:rgb(179, 179, 179);
        box-shadow: 3px;
        border-radius: 5px;
        border: 3px;
        border-color: rgb(130, 130, 130);
        padding: 15px;
        text-align: center;
        width: 380px;
    }

    .exit-button {
        color:black;
        background-color: rgb(251, 77, 77);
        position: absolute;
        border-radius: 100px;
        top: 25px;
        left: 25px;  
    }

    .grid {
        display: flex;
        flex-wrap: wrap;  
        justify-content: center; 
        gap: 10px; 
        margin-bottom: 15px;
    }

    .grid img {
        width: calc(25% - 10px); /* change the percentage to alter how many per row */
        height: auto;            
    }



</style>

</head>

<html>


    <button id="openModal">Open Modal</button>

    <dialog id="myModal">
        <div class="modal-inner">
            <div class="grid" id="imageGrid">

            </div>

            <button class="exit-button" id="closeModal">X</button>
        </div>
    </div>


</html>

<script>
    const openBtn = document.getElementById("openModal");
    const closeBtn = document.getElementById("closeModal");
    const modal = document.getElementById("myModal");

    openBtn.onclick = () => modal.showModal();
    closeBtn.onclick = () => modal.close();



    const grid = document.getElementById("imageGrid");
    const username = "sarah08641";
    const repo = "website";
    const folder = "clothes/images/bottoms"; // Matches your repo path

    async function autoLoadImages() {
        const url = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;   
        
        try {
            const response = await fetch(url);
            const items = await response.json();

            // 2. Filter images and create clickable items
            grid.innerHTML = items
                .filter(item => item.name.match(/\.(png|jpg|jpeg|gif|webp)$/i))
                .map(image => `
                    <div class="clothing-item" onclick="change('bottoms', '${image.download_url}')" style="cursor:pointer">
                        <img src="${image.download_url}" alt="${image.name}" style="width:100%">
                        <p style="font-size: 10px;">${image.name.replace('.png', '').replace(/_/g, ' ')}</p>
                    </div>
                `).join('');
            
        } catch (error) {
            console.error("GitHub API failed:", error);
            grid.innerHTML = "<p>Could not load clothes.</p>";
        }

        autoLoadImages();
    }

</script>

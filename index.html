<!DOCTYPE html>
<html>

        <title>Sarah site</title>
        <link rel="stylesheet" href="style.css"
    </head>
    <body>
        <div class="window">
            <div class="header">
                <a href="/" class="tab">me</a>
                <a href="projects/" class="tab">projects</a>
                <a href="art/" class="tab">art</a>
            </div>

            <div id="me-content" class="card">
                <h1>I'm Sarah</h1>
                <div class="img-container">
                    <img id="me-img" src="media/images/blinking.gif">
                </div>
                <p></p>
                <p>I am currently studying computer science and linguistics in university</p>
            </div>

<script>    
    function updateImageByTime() {
        const hour = new Date().getHours();
        const img = document.getElementById('me-img');

        if (hour <= 6 || hour >= 22) {
            img.src = "media/images/sleepy.png";
        } else {
            img.src = "media/images/blinking.gif";
        }
    }
    updateImageByTime();
</script>

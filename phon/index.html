<html>
    <head>
        <meta charset="UTF-8">
        <title>
            French Phonology Acceptor
        </title>
        <link rel="stylesheet" href="https://pyscript.net/releases/2024.10.1/core.css">
        <script type="module" src="https://pyscript.net/releases/2024.10.1/core.js"></script>
    </head>
    <style>
        body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        background: #fafafa;
        }

        h1 {
        margin-bottom: 20px;
        }

        #english {
        font-size: 1.2rem;
        padding: 10px;
        width: 60%;
        margin-bottom: 30px;
        border: 2px solid #ccc;
        border-radius: 8px;
        }

        .section {
        margin-bottom: 30px;
        text-align: center;
        }

        .section h2 {
        margin-bottom: 10px;
        font-size: 1.2rem;
        color: #444;
        }

        .keyboard-container {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: 40px; /* Space between the two keyboards */
        flex-wrap: wrap; /* Allows stacking if the screen is too narrow */

        }

        /* Optional: Make each section take up equal space or have a max width */
        .section {
        flex: 1;
        min-width: 300px;
        }

        .keyboard-row {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
        }

        .key {
        background: #f4f4f9;
        border: 2px solid #ccc;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 1.3rem;
        cursor: pointer;
        transition: all 0.2s ease-in-out;
        }

        .key:hover {
        background: #e0e0f7;
        border-color: #888;
        transform: translateY(-2px);
        box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        .key:active {
        background: #d1d1f0;
        transform: translateY(1px);
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .section {
        max-width: 800px;
        }
    </style>
    <body>
        <h1>valid french word?</h1>
        <p>example words: ʁəgaʁde - regarde</p>
        <p>example words: nwaʁ - noir</p>
        <p>example words: bj~ɛ - bein</p>
        <input type="text" name="english" id="english" placeholder="Type English here..." />
        <button py-click="translate_english">Translate</button>

        <div id="output"></div>
        <div class="keyboard-container">
        <div class="keyboard">
            <!-- Consonants -->
            <div class="section">
                <h2>Consonants</h2>
                <div class="keyboard-row">
                <button class="key">P</button>
                <button class="key">b</button>
                <button class="key">t</button>
                <button class="key">d</button>
                <button class="key">k</button>
                <button class="key">g</button>
                <button class="key">ʔ</button>
                </div>
                <div class="keyboard-row">
                <button class="key">m</button>
                <button class="key">n</button>
                <button class="key">ŋ</button>
                <button class="key">ɲ</button>
                </div>
                <div class="keyboard-row">
                <button class="key">f</button>
                <button class="key">v</button>
                <button class="key">θ</button>
                <button class="key">ð</button>
                <button class="key">s</button>
                <button class="key">z</button>
                <button class="key">ʃ</button>
                <button class="key">ʒ</button>
                <button class="key">h</button>
                <button class="key">ʁ</button>
                </div>
                <div class="keyboard-row">
                <button class="key">ɹ</button>
                <button class="key">l</button>
                <button class="key">j</button>
                <button class="key">w</button>
                <button class="key">ɥ</button>
                </div>
            </div>
            </div>

            <!-- Vowels -->
            <div class="keyboard-container">
            <div class="section">
                <h2>Vowels</h2>
                <div class="keyboard-row">
                <button class="key">i</button>
                <button class="key">y</button>
                <button class="key">ɪ</button>
                <button class="key">e</button>
                <button class="key">ø</button>
                <button class="key">ɛ</button>
                <button class="key">œ</button>
                <button class="key">æ</button>
                <button class="key">a</button>
                <button class="key">ɑ</button>
                </div>
                <div class="keyboard-row">
                <button class="key">u</button>
                <button class="key">ʊ</button>
                <button class="key">o</button>
                <button class="key">ɔ</button>
                </div>
                <div class="keyboard-row">
                <button class="key">ə</button>
                <button class="key">ʌ</button>
                </div>
            </div>
            </div>

            <!-- Diacritics -->
            <div class="keyboard-container">
            <div class="section">
                <h2>nasalize</h2>
                <div class="keyboard-row">
                <button class="key">~</button>
                </div>
            </div>
        </div>
        </div>

        <script>
        const englishInput = document.getElementById("english");
        document.querySelectorAll(".key").forEach(key => {
            key.addEventListener("click", () => {
            // insert symbol at cursor instead of just appending
            const start = englishInput.selectionStart;
            const end = englishInput.selectionEnd;
            const text = englishInput.value;
            const symbol = key.textContent;

            englishInput.value = text.slice(0, start) + symbol + text.slice(end);
            englishInput.selectionStart = englishInput.selectionEnd = start + symbol.length;
            englishInput.focus();
            });
        });
        </script>
        

        <script type="py" src="./pythonscript.py" config="./pyscript.json"></script>

    </body>
</html>

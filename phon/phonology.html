<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IPA Keyboard</title>
  <style>
    body {
      font-family: "Charis SIL", "Doulos SIL", "Arial Unicode MS", sans-serif;
      padding: 20px;
    }
    textarea {
      width: 100%;
      height: 120px;
      font-size: 20px;
      margin-bottom: 20px;
    }
    h2 {
      margin-top: 30px;
    }
    .keyboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
      gap: 5px;
      max-width: 700px;
    }
    button {
      font-size: 20px;
      padding: 8px;
      border: 1px solid #ccc;
      background: #f9f9f9;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: #eee;
    }
  </style>
</head>

<body>
  <h1>IPA Keyboard</h1>
  <textarea id="output" placeholder="Type IPA here..."></textarea>
  <button id="submitBtn">Submit</button>

<div id="result"></div>

  <h2>Consonants</h2>
  <div class="keyboard">
    <!-- Plosives -->
    <button data-char="p">p</button>
    <button data-char="b">b</button>
    <button data-char="t">t</button>
    <button data-char="d">d</button>
    <button data-char="ʈ">ʈ</button>
    <button data-char="ɖ">ɖ</button>
    <button data-char="c">c</button>
    <button data-char="ɟ">ɟ</button>
    <button data-char="k">k</button>
    <button data-char="g">g</button>
    <button data-char="q">q</button>
    <button data-char="ɢ">ɢ</button>
    <button data-char="ʡ">ʡ</button>
    <button data-char="ʔ">ʔ</button>

    <!-- Nasals -->
    <button data-char="m">m</button>
    <button data-char="ɱ">ɱ</button>
    <button data-char="n">n</button>
    <button data-char="ɳ">ɳ</button>
    <button data-char="ɲ">ɲ</button>
    <button data-char="ŋ">ŋ</button>
    <button data-char="ɴ">ɴ</button>

    <!-- Fricatives -->
    <button data-char="ʙ">ʙ</button>
    <button data-char="r">r</button>
    <button data-char="ʀ">ʀ</button>
    <button data-char="ɾ">ɾ</button>
    <button data-char="ɽ">ɽ</button>
    <button data-char="ɸ">ɸ</button>
    <button data-char="β">β</button>
    <button data-char="f">f</button>
    <button data-char="v">v</button>
    <button data-char="θ">θ</button>
    <button data-char="ð">ð</button>
    <button data-char="s">s</button>
    <button data-char="z">z</button>
    <button data-char="ʃ">ʃ</button>
    <button data-char="ʒ">ʒ</button>
    <button data-char="ʂ">ʂ</button>
    <button data-char="ʐ">ʐ</button>
    <button data-char="ç">ç</button>
    <button data-char="ʝ">ʝ</button>
    <button data-char="x">x</button>
    <button data-char="ɣ">ɣ</button>
    <button data-char="χ">χ</button>
    <button data-char="ʁ">ʁ</button>
    <button data-char="ħ">ħ</button>
    <button data-char="ʕ">ʕ</button>
    <button data-char="h">h</button>
    <button data-char="ɦ">ɦ</button>

    <!-- Approximants -->
    <button data-char="ʋ">ʋ</button>
    <button data-char="ɹ">ɹ</button>
    <button data-char="ɻ">ɻ</button>
    <button data-char="j">j</button>
    <button data-char="ɰ">ɰ</button>

    <!-- Laterals -->
    <button data-char="l">l</button>
    <button data-char="ɭ">ɭ</button>
    <button data-char="ʎ">ʎ</button>
    <button data-char="ʟ">ʟ</button>
    <button data-char="ɬ">ɬ</button>
    <button data-char="ɮ">ɮ</button>
  </div>
  
  <h2>Vowels</h2>
  <div class="keyboard">
    <!-- Close -->
    <button data-char="i">i</button>
    <button data-char="ĩ">ĩ</button>
    <button data-char="y">y</button>
    <button data-char="ỹ">ỹ</button>
    <button data-char="ɨ">ɨ</button>
    <button data-char="ɨ̃">ɨ̃</button>
    <button data-char="ʉ">ʉ</button>
    <button data-char="ʉ̃">ʉ̃</button>
    <button data-char="ɯ">ɯ</button>
    <button data-char="ɯ̃">ɯ̃</button>
    <button data-char="u">u</button>
    <button data-char="ũ">ũ</button>

    <!-- Near-close -->
    <button data-char="ɪ">ɪ</button>
    <button data-char="ɪ̃">ɪ̃</button>
    <button data-char="ʏ">ʏ</button>
    <button data-char="ʏ̃">ʏ̃</button>
    <button data-char="ʊ">ʊ</button>
    <button data-char="ʊ̃">ʊ̃</button>

    <!-- Close-mid -->
    <button data-char="e">e</button>
    <button data-char="ẽ">ẽ</button>
    <button data-char="ø">ø</button>
    <button data-char="ø̃">ø̃</button>
    <button data-char="ɘ">ɘ</button>
    <button data-char="ɘ̃">ɘ̃</button>
    <button data-char="ɵ">ɵ</button>
    <button data-char="ɵ̃">ɵ̃</button>
    <button data-char="ɤ">ɤ</button>
    <button data-char="ɤ̃">ɤ̃</button>
    <button data-char="o">o</button>
    <button data-char="õ">õ</button>

    <!-- Mid -->
    <button data-char="ə">ə</button>
    <button data-char="ə̃">ə̃</button>

    <!-- Open-mid -->
    <button data-char="ɛ">ɛ</button>
    <button data-char="ɛ̃">ɛ̃</button>
    <button data-char="œ">œ</button>
    <button data-char="œ̃">œ̃</button>
    <button data-char="ɜ">ɜ</button>
    <button data-char="ɜ̃">ɜ̃</button>
    <button data-char="ɞ">ɞ</button>
    <button data-char="ɞ̃">ɞ̃</button>
    <button data-char="ʌ">ʌ</button>
    <button data-char="ʌ̃">ʌ̃</button>
    <button data-char="ɔ">ɔ</button>
    <button data-char="ɔ̃">ɔ̃</button>

    <!-- Near-open -->
    <button data-char="æ">æ</button>
    <button data-char="æ̃">æ̃</button>
    <button data-char="ɐ">ɐ</button>
    <button data-char="ɐ̃">ɐ̃</button>

    <!-- Open -->
    <button data-char="a">a</button>
    <button data-char="ã">ã</button>
    <button data-char="ɶ">ɶ</button>
    <button data-char="ɶ̃">ɶ̃</button>
    <button data-char="ɑ">ɑ</button>
    <button data-char="ɑ̃">ɑ̃</button>
    <button data-char="ɒ">ɒ</button>
    <button data-char="ɒ̃">ɒ̃</button>
  </div>

  <script>
    const textarea = document.getElementById('output');
    const buttons = document.querySelectorAll('.keyboard button');

    buttons.forEach(button => {
      button.addEventListener('click', () => {
        const symbol = button.dataset.char;
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const text = textarea.value;
        textarea.value = text.slice(0, start) + symbol + text.slice(end);
        textarea.selectionStart = textarea.selectionEnd = start + symbol.length;
        textarea.focus();
      });
    });
  </script>
  
</body>
</html>
